name: Python Check

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile source files
        run: python -m compileall src tools

      - name: Run Question 1 demo
        run: python src/q1_pharmacy_hash_table.py --demo

      - name: Run Question 2 demo
        run: python src/q2_transaction_divide_conquer.py --demo

      - name: Run Question 3 demo
        run: python src/q3_factorial_threading.py --demo
